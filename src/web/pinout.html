<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pin assignments</title>
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <style>
      /* The pin-assignments card fills its OS window (no modal chrome). */
      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--color-surface-0);
      }
      body {
        color: var(--color-text);
        font-family: var(--font-sans);
        overflow: auto;
      }
      .chip-pinout {
        position: static;
        min-width: 0;
        max-width: none;
        width: 100%;
        min-height: 100vh;
        border: none;
        border-radius: 0;
        box-shadow: none;
        background: transparent;
      }
      .pinout-empty {
        padding: var(--space-5);
        color: var(--color-muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="pinout-root"></div>
    <script type="module" src="scripts/pinout.js"></script>
  </body>
</html>
