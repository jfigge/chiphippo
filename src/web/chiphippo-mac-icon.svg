<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Chip Hippo macOS app icon">
  <title>Chip Hippo macOS icon</title>
  <!--
    macOS app-icon grid (Big Sur+): the rounded-rectangle body occupies a
    centered 826×826 region of a 1024×1024 canvas, leaving 99px of transparent
    margin on every side (the Big Sur safe area — 824×824 / 100px — nudged 1px
    larger on each side). The original 512-unit artwork is scaled by 826/512
    (=1.61328125) and offset by 99px so it lands exactly in that region; its
    corner radius (114 → ~184) matches Apple's spec (185.4). The transparent
    border is REQUIRED — the dock/tray renders the body at native visual weight.
  -->
  <g transform="translate(99,99) scale(1.61328125)">
    <rect x="0" y="0" width="512" height="512" rx="114" fill="#2F855A"/>
    <!-- ears -->
    <circle cx="170" cy="146" r="40" fill="#FFFFFF"/>
    <circle cx="342" cy="146" r="40" fill="#FFFFFF"/>
    <!-- head -->
    <rect x="144" y="140" width="224" height="190" rx="74" fill="#FFFFFF"/>
    <rect x="118" y="260" width="276" height="150" rx="74" fill="#FFFFFF"/>
    <!-- eyes -->
    <circle cx="201" cy="198" r="17" fill="#1C1C1C"/>
    <circle cx="311" cy="198" r="17" fill="#1C1C1C"/>
    <!-- DIP chip across the snout: the 74xx motif -->
    <g>
      <!-- legs (4 per side, top and bottom) -->
      <rect x="200" y="306" width="14" height="18" fill="#8F969E"/>
      <rect x="232" y="306" width="14" height="18" fill="#8F969E"/>
      <rect x="264" y="306" width="14" height="18" fill="#8F969E"/>
      <rect x="296" y="306" width="14" height="18" fill="#8F969E"/>
      <rect x="200" y="368" width="14" height="18" fill="#8F969E"/>
      <rect x="232" y="368" width="14" height="18" fill="#8F969E"/>
      <rect x="264" y="368" width="14" height="18" fill="#8F969E"/>
      <rect x="296" y="368" width="14" height="18" fill="#8F969E"/>
      <!-- body -->
      <rect x="186" y="320" width="140" height="52" rx="8" fill="#23272B"/>
      <!-- pin-1 notch + dimple -->
      <circle cx="186" cy="346" r="11" fill="#FFFFFF"/>
      <circle cx="207" cy="361" r="5" fill="#FFFFFF" opacity="0.85"/>
    </g>
  </g>
</svg>
